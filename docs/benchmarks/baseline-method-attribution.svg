<svg xmlns="http://www.w3.org/2000/svg" width="920" height="186" viewBox="0 0 920 186"><style>.t{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;fill:#111}.title{font-size:20px;font-weight:700}.label{font-size:13px}.small{font-size:12px;fill:#333}</style><rect width="920" height="186" x="0" y="0" fill="#fff"/><text x="20" y="38" class="t title">Verdict method attribution (baseline)</text><text x="20" y="62" class="t small">Shows how many malware samples are locked to MALICIOUS by static override vs AI verdict alone.</text><text x="20" y="84" class="t label" dominant-baseline="middle">MalwareBazaar strict-modlike <tspan class="small">(n=70)</tspan></text><rect width="590" height="20" x="310" y="74" fill="none" stroke="#ddd"/><rect width="531" height="20" x="310" y="74" fill="#1565c0"/><text x="575.5" y="84" fill="#fff" class="t small" dominant-baseline="middle" text-anchor="middle">63</text><rect width="59" height="20" x="841" y="74" fill="#2e7d32"/><text x="870.5" y="84" fill="#fff" class="t small" dominant-baseline="middle" text-anchor="middle">7</text><text x="20" y="118" class="t label" dominant-baseline="middle">Modrinth top-50 <tspan class="small">(n=50)</tspan></text><rect width="590" height="20" x="310" y="108" fill="none" stroke="#ddd"/><rect width="590" height="20" x="310" y="108" fill="#2e7d32"/><text x="605" y="118" fill="#fff" class="t small" dominant-baseline="middle" text-anchor="middle">50</text><rect width="12" height="12" x="20" y="150" fill="#1565c0"/><text x="36" y="160" class="t small" dominant-baseline="middle">static_override(ai_verdict)</text><rect width="12" height="12" x="243" y="150" fill="#2e7d32"/><text x="259" y="160" class="t small" dominant-baseline="middle">ai_verdict</text><rect width="12" height="12" x="347" y="150" fill="#ef6c00"/><text x="363" y="160" class="t small" dominant-baseline="middle">static_override(heuristic_fallback)</text><rect width="12" height="12" x="626" y="150" fill="#616161"/><text x="642" y="160" class="t small" dominant-baseline="middle">heuristic_fallback</text></svg>