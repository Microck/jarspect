<rect x="0" y="0" width="920" height="186" fill="#fff"/>
<text class="t title" x="20" y="38">Verdict method attribution (baseline)</text>
<text class="t small" x="20" y="62">Shows how many malware samples are locked to MALICIOUS by static override vs AI verdict alone.</text>
<text class="t label" x="20" y="84" dominant-baseline="middle">MalwareBazaar strict-modlike <tspan class="small">(n=70)</tspan></text>
<rect x="310" y="74" width="590" height="20" fill="none" stroke="#ddd"/>
<rect x="310" y="74" width="531" height="20" fill="#1565c0"/>
<text class="t small" x="575.5" y="84" text-anchor="middle" dominant-baseline="middle" fill="#fff">63</text>
<rect x="841" y="74" width="59" height="20" fill="#2e7d32"/>
<text class="t small" x="870.5" y="84" text-anchor="middle" dominant-baseline="middle" fill="#fff">7</text>
<text class="t label" x="20" y="118" dominant-baseline="middle">Modrinth top-50 <tspan class="small">(n=50)</tspan></text>
<rect x="310" y="108" width="590" height="20" fill="none" stroke="#ddd"/>
<rect x="310" y="108" width="590" height="20" fill="#2e7d32"/>
<text class="t small" x="605" y="118" text-anchor="middle" dominant-baseline="middle" fill="#fff">50</text>
<rect x="20" y="150" width="12" height="12" fill="#1565c0"/>
<text class="t small" x="36" y="160" dominant-baseline="middle">static_override(ai_verdict)</text>
<rect x="243" y="150" width="12" height="12" fill="#2e7d32"/>
<text class="t small" x="259" y="160" dominant-baseline="middle">ai_verdict</text>
<rect x="347" y="150" width="12" height="12" fill="#ef6c00"/>
<text class="t small" x="363" y="160" dominant-baseline="middle">static_override(heuristic_fallback)</text>
<rect x="626" y="150" width="12" height="12" fill="#616161"/>
<text class="t small" x="642" y="160" dominant-baseline="middle">heuristic_fallback</text>
